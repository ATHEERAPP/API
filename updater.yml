name: Update Matches from Kooora

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # 👈 هذا السطر هو الحل لمنع فشل الرفع (Push)

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 👈 حل مشكلة التحذير
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python update_matches.py

      - name: Commit and Push
        run: |
          git config --global user.name "Atheer Bot"
          git config --global user.email "bot@atheer.com"
          git add matches.json
          git commit -m "Update matches from Kooora" || echo "No changes to commit"
          git push
