name: Update Matches from Kooora

on:
  schedule:
    - cron: '*/5 * * * *' # تحديث كل 5 دقائق
  workflow_dispatch: # للتشغيل اليدوي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python update_matches.py

      - name: Commit and Push
        run: |
          git config --global user.name "Atheer Bot"
          git config --global user.email "bot@atheer.com"
          git add matches.json
          git commit -m "Update matches from Kooora" || exit 0
          git push
