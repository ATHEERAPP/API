name: Match Auto Updater

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 👈 تم تصحيح الشرطة هنا

      - name: Install dependencies
        run: pip install requests

      - name: Run updater script
        run: python update_matches.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Atheer-Robot'
          git config --global user.email 'robot@atheer.com'
          git add matches.json
          git commit -m "🤖 تحديث تلقائي للنتائج" || echo "No changes to commit"
          git push
