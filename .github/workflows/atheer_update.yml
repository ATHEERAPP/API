name: Atheer Live Updates

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          # حذفنا lxml لأنها تسبب مشاكل أحياناً في التثبيت

      - name: Run Scraper
        run: python update_matches.py
        continue-on-error: false # نريد معرفة الخطأ إذا حدث

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git commit -m "Auto update" || exit 0
          git push
